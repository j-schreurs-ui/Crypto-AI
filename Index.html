<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoSentinel</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a0f;--s1:#0d1520;--s2:#111e2e;--bd:#1c2e42;--ac:#00ffd0;--buy:#00e676;--sell:#ff3d6b;--neu:#ffc107;--bl:#4da6ff;--tx:#ddeeff;--mu:#4a6580;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 70% 50% at 10% 5%,rgba(0,255,208,.05),transparent 55%),radial-gradient(ellipse 50% 40% at 90% 95%,rgba(77,166,255,.04),transparent 55%);}
.gbg{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,255,208,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,208,.018) 1px,transparent 1px);background-size:40px 40px;}
header{position:sticky;top:0;z-index:100;padding:11px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);background:rgba(6,10,15,.96);backdrop-filter:blur(16px);}
.logo{display:flex;align-items:center;gap:9px;}
.lm{width:31px;height:31px;border:1.5px solid var(--ac);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;animation:lgl 4s ease-in-out infinite;}
@keyframes lgl{0%,100%{box-shadow:0 0 12px rgba(0,255,208,.12);}50%{box-shadow:0 0 24px rgba(0,255,208,.3);}}
.logo h1{font-size:15px;font-weight:900;}.logo h1 em{color:var(--ac);font-style:normal;}
.hr{display:flex;align-items:center;gap:10px;}
.lb{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid rgba(0,230,118,.3);background:rgba(0,230,118,.07);font-family:'Space Mono',monospace;font-size:10px;color:var(--buy);}
.dot{width:5px;height:5px;border-radius:50%;background:var(--buy);animation:pp 1.4s infinite;}
@keyframes pp{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.5);}}
.tw{font-family:'Space Mono',monospace;font-size:10px;color:var(--mu);}.tw b{color:var(--ac);}
.strip{position:relative;z-index:1;display:flex;gap:6px;padding:13px 18px 0;flex-wrap:wrap;}
.cb{flex:1;min-width:95px;padding:9px 11px;border-radius:10px;border:1px solid var(--bd);background:var(--s1);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;}
.cb:hover{border-color:var(--ac);}
.cb.active{border-color:var(--ac);background:rgba(0,255,208,.07);box-shadow:0 0 16px rgba(0,255,208,.1);}
.ci{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;}
.cs{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;}
.cpx{font-family:'Space Mono',monospace;font-size:9px;color:var(--mu);margin-top:1px;}
.cch{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;}
